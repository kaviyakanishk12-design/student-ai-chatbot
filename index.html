<!DOCTYPE html>
<html>
<head>
<title>Student AI Chatbot</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-container{
width:420px;
background:white;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
padding:20px;
}

h2{
text-align:center;
margin-bottom:15px;
}

#chatbox{
height:300px;
border:1px solid #ddd;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
border-radius:5px;
}

.user{
color:#007bff;
margin:5px 0;
}

.bot{
color:#28a745;
margin:5px 0;
}

.input-area{
display:flex;
}

input{
flex:1;
padding:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:8px 15px;
margin-left:5px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="chat-container">

<h2>Student AI Chatbot</h2>

<div id="chatbox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask about courses, exams, placements..." onkeypress="if(event.key==='Enter') sendMessage()">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("userInput").value.toLowerCase();
let chatbox = document.getElementById("chatbox");

if(input.trim() === "") return;

chatbox.innerHTML += "<div class='user'><b>You:</b> "+input+"</div>";

let reply="";

if(input.includes("course"))
reply="Our college offers CSE, IT, ECE and Mechanical courses.";

else if(input.includes("exam"))
reply="Exam schedules will be announced on the college portal.";

else if(input.includes("placement"))
reply="Placement training starts from the 3rd year.";

else if(input.includes("internship"))
reply="Students can apply for internships from the 2nd year.";

else if(input.includes("hello") || input.includes("hi"))
reply="Hello! How can I help you today?";

else
reply="Sorry, I didn't understand. Please ask about courses, exams, placements or internships.";

setTimeout(function(){
chatbox.innerHTML += "<div class='bot'><b>Bot:</b> "+reply+"</div>";
chatbox.scrollTop = chatbox.scrollHeight;
},500);

document.getElementById("userInput").value="";

}

</script>

</body>
</html>
